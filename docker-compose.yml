# Docker Compose V2 — RLM API Service
# API:    http://127.0.0.1:26030
# Docs:   http://127.0.0.1:26030/docs

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: rlm-api
    ports:
      - "127.0.0.1:${RLM_API_PORT:-26030}:26030"
    env_file:
      - .env
    environment:
      - RLM_REDIS_URL=${RLM_REDIS_URL:-redis://redis:6379/0}
      - RLM_REDIS_PASSWORD=${RLM_REDIS_PASSWORD:-}
      - RLM_API_WORKERS=${RLM_API_WORKERS:-4}
      - RLM_API_LOG_LEVEL=${RLM_API_LOG_LEVEL:-info}
      - RLM_MONGODB_URI=${RLM_MONGODB_URI:-mongodb://admin:ABigSupersecretR%40m74anbeh@mongo:27017/rlm?authSource=admin}
      - RLM_MONGODB_DATABASE=${RLM_MONGODB_DATABASE:-rlm}
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 26030
      --workers ${RLM_API_WORKERS:-4}
      --log-level ${RLM_API_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:26030/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - rlm-network
      - shared-webservices
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      - RLM_REDIS_URL=${RLM_REDIS_URL:-redis://redis:6379/0}
      - RLM_REDIS_PASSWORD=${RLM_REDIS_PASSWORD:-}
      - RLM_STREAM_BLOCK_MS=${RLM_STREAM_BLOCK_MS:-5000}
      - RLM_MONGODB_URI=${RLM_MONGODB_URI:-mongodb://admin:ABigSupersecretR%40m74anbeh@mongo:27017/rlm?authSource=admin}
      - RLM_MONGODB_DATABASE=${RLM_MONGODB_DATABASE:-rlm}
    command: ["python", "-m", "api.worker"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,time; assert time.time()-os.path.getmtime('/tmp/worker_heartbeat')<60\""]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - rlm-network
      - shared-webservices
    deploy:
      replicas: ${RLM_WORKER_REPLICAS:-4}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

networks:
  rlm-network:
    driver: bridge
  shared-webservices:
    external: true