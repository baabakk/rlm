# Docker Compose V2 — RLM API Service
# API:    http://127.0.0.1:26030
# Docs:   http://127.0.0.1:26030/docs
#
# Usage:
#   docker compose up                          # external Redis expected
#   docker compose --profile redis up          # includes local Redis
#   docker compose up --scale worker=8         # scale workers

x-rlm-build: &rlm-build
  image: rlm-service:latest
  build:
    context: .
    dockerfile: docker/Dockerfile

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - rlm-network
    profiles:
      - redis

  api:
    <<: *rlm-build
    container_name: rlm-api
    ports:
      - "127.0.0.1:${RLM_API_PORT:-26030}:26030"
    env_file:
      - .env
    command:
      - sh
      - -c
      - >
        uvicorn api.main:app
        --host 0.0.0.0
        --port 26030
        --workers "$${RLM_API_WORKERS:-4}"
        --log-level "$${RLM_API_LOG_LEVEL:-info}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:26030/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
        required: false
    networks:
      - rlm-network
      - shared-webservices
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

  worker:
    <<: *rlm-build
    env_file:
      - .env
    command: ["python", "-m", "api.worker"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
        required: false
    networks:
      - rlm-network
      - shared-webservices
    deploy:
      replicas: ${RLM_WORKER_REPLICAS:-4}
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  redis-data:

networks:
  rlm-network:
    driver: bridge
  shared-webservices:
    external: true
